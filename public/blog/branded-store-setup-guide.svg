<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="0.7" fill="#ffffff" opacity="0.035"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Title -->
  <text x="600" y="72" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#ffffff" opacity="0.6">Set up in 4 simple steps</text>
  <line x1="460" y1="88" x2="740" y2="88" stroke="#00BCD4" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Step 1 -->
  <g>
    <rect x="60" y="120" width="240" height="400" rx="14" fill="#152238" stroke="#00BCD4" stroke-opacity="0.1" stroke-width="1"/>
    <circle cx="180" cy="170" r="30" fill="#00BCD4" opacity="0.1" stroke="#00BCD4" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="180" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#26C6DA">1</text>
    <text x="180" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffffff" opacity="0.9">Claim Address</text>

    <!-- Input mockup -->
    <rect x="86" y="260" width="188" height="36" rx="8" fill="#0B1120" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="102" y="283" font-family="ui-monospace, monospace" font-size="12" fill="#26C6DA">alice-shop</text>
    <text x="178" y="283" font-family="ui-monospace, monospace" font-size="11" fill="#ffffff" opacity="0.25">.mymbz.org</text>

    <!-- Save button -->
    <rect x="86" y="310" width="188" height="34" rx="8" fill="#00BCD4" opacity="0.15" stroke="#00BCD4" stroke-opacity="0.3"/>
    <text x="180" y="332" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#26C6DA">Save</text>

    <!-- Result -->
    <rect x="86" y="370" width="188" height="50" rx="8" fill="#0B1120" stroke="#28c840" stroke-opacity="0.2"/>
    <circle cx="108" cy="395" r="8" fill="#28c840" opacity="0.15"/>
    <path d="M104 395l3 3 6-6" stroke="#28c840" stroke-width="1.5" stroke-linecap="round"/>
    <text x="124" y="392" font-family="system-ui, sans-serif" font-size="10" fill="#28c840" opacity="0.7">Live at</text>
    <text x="124" y="406" font-family="ui-monospace, monospace" font-size="9" fill="#26C6DA">alice-shop.mymbz.org</text>
  </g>

  <!-- Arrow 1?2 -->
  <line x1="310" y1="320" x2="340" y2="320" stroke="#00BCD4" stroke-opacity="0.25" stroke-width="1.5"/>
  <path d="M336 315l8 5-8 5" fill="#00BCD4" opacity="0.25"/>

  <!-- Step 2 -->
  <g>
    <rect x="350" y="120" width="240" height="400" rx="14" fill="#152238" stroke="#00BCD4" stroke-opacity="0.1" stroke-width="1"/>
    <circle cx="470" cy="170" r="30" fill="#00BCD4" opacity="0.1" stroke="#00BCD4" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="470" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#26C6DA">2</text>
    <text x="470" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffffff" opacity="0.9">Share Store</text>

    <!-- Link rows -->
    <rect x="376" y="260" width="188" height="40" rx="8" fill="#0B1120" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="392" y="275" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" opacity="0.4">Brand URL</text>
    <text x="392" y="290" font-family="ui-monospace, monospace" font-size="8.5" fill="#26C6DA">alice-shop.mymbz.org</text>
    <rect x="536" y="270" width="22" height="22" rx="4" fill="#00BCD4" opacity="0.12"/>
    <text x="547" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#26C6DA">?</text>

    <rect x="376" y="312" width="188" height="40" rx="8" fill="#0B1120" stroke="#ffffff" stroke-opacity="0.04"/>
    <text x="392" y="327" font-family="system-ui, sans-serif" font-size="9" fill="#ffffff" opacity="0.4">Telegram</text>
    <text x="392" y="342" font-family="ui-monospace, monospace" font-size="8.5" fill="#ffffff" opacity="0.3">t.me/aliceShopBot</text>
    <rect x="536" y="322" width="22" height="22" rx="4" fill="#00BCD4" opacity="0.08"/>
    <text x="547" y="337" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#26C6DA" opacity="0.5">?</text>

    <!-- Social icons placeholder -->
    <text x="470" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ffffff" opacity="0.25">Share anywhere</text>
    <g opacity="0.3" transform="translate(420, 412)">
      <rect x="0" y="0" width="28" height="28" rx="6" fill="#1E3050"/>
      <rect x="36" y="0" width="28" height="28" rx="6" fill="#1E3050"/>
      <rect x="72" y="0" width="28" height="28" rx="6" fill="#1E3050"/>
    </g>
  </g>

  <!-- Arrow 2?3 -->
  <line x1="600" y1="320" x2="630" y2="320" stroke="#00BCD4" stroke-opacity="0.25" stroke-width="1.5"/>
  <path d="M626 315l8 5-8 5" fill="#00BCD4" opacity="0.25"/>

  <!-- Step 3 -->
  <g>
    <rect x="640" y="120" width="240" height="400" rx="14" fill="#152238" stroke="#00BCD4" stroke-opacity="0.1" stroke-width="1"/>
    <circle cx="760" cy="170" r="30" fill="#00BCD4" opacity="0.1" stroke="#00BCD4" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="760" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#26C6DA">3</text>
    <text x="760" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffffff" opacity="0.9">Connect Bot</text>

    <!-- Token input -->
    <text x="666" y="272" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.35">Bot Token</text>
    <rect x="666" y="280" width="188" height="36" rx="8" fill="#0B1120" stroke="#ffffff" stroke-opacity="0.06"/>
    <text x="682" y="303" font-family="ui-monospace, monospace" font-size="10" fill="#ffffff" opacity="0.2">Paste token here...</text>

    <!-- Connect button -->
    <rect x="666" y="330" width="188" height="34" rx="8" fill="#00BCD4" opacity="0.15" stroke="#00BCD4" stroke-opacity="0.3"/>
    <text x="760" y="352" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#26C6DA">Connect Bot</text>

    <!-- Connected status -->
    <rect x="666" y="390" width="188" height="50" rx="8" fill="#0B1120" stroke="#28c840" stroke-opacity="0.2"/>
    <circle cx="688" cy="415" r="8" fill="#28c840" opacity="0.15"/>
    <path d="M684 415l3 3 6-6" stroke="#28c840" stroke-width="1.5" stroke-linecap="round"/>
    <text x="704" y="412" font-family="system-ui, sans-serif" font-size="10" fill="#28c840" opacity="0.7">Connected</text>
    <text x="704" y="426" font-family="system-ui, sans-serif" font-size="10" fill="#ffffff" opacity="0.5">@aliceShopBot</text>
  </g>

  <!-- Arrow 3?4 -->
  <line x1="890" y1="320" x2="920" y2="320" stroke="#00BCD4" stroke-opacity="0.25" stroke-width="1.5"/>
  <path d="M916 315l8 5-8 5" fill="#00BCD4" opacity="0.25"/>

  <!-- Step 4 -->
  <g>
    <rect x="930" y="120" width="240" height="400" rx="14" fill="#152238" stroke="#00BCD4" stroke-opacity="0.1" stroke-width="1"/>
    <circle cx="1050" cy="170" r="30" fill="#00BCD4" opacity="0.1" stroke="#00BCD4" stroke-opacity="0.35" stroke-width="1.5"/>
    <text x="1050" y="178" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" font-weight="700" fill="#26C6DA">4</text>
    <text x="1050" y="230" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffffff" opacity="0.9">Start Selling</text>

    <!-- Product cards -->
    <rect x="956" y="260" width="188" height="80" rx="8" fill="#0B1120" stroke="#ffffff" stroke-opacity="0.04"/>
    <rect x="966" y="270" width="60" height="50" rx="4" fill="#1E3050"/>
    <rect x="1036" y="274" width="80" height="8" rx="3" fill="#ffffff" opacity="0.12"/>
    <rect x="1036" y="290" width="50" height="6" rx="3" fill="#ffffff" opacity="0.06"/>
    <rect x="1036" y="306" width="40" height="8" rx="3" fill="#00BCD4" opacity="0.3"/>

    <rect x="956" y="352" width="188" height="80" rx="8" fill="#0B1120" stroke="#ffffff" stroke-opacity="0.04"/>
    <rect x="966" y="362" width="60" height="50" rx="4" fill="#1E3050"/>
    <rect x="1036" y="366" width="70" height="8" rx="3" fill="#ffffff" opacity="0.12"/>
    <rect x="1036" y="382" width="90" height="6" rx="3" fill="#ffffff" opacity="0.06"/>
    <rect x="1036" y="398" width="50" height="8" rx="3" fill="#00BCD4" opacity="0.3"/>

    <!-- Checkmark -->
    <circle cx="1050" cy="470" r="22" fill="#00BCD4" opacity="0.12" stroke="#00BCD4" stroke-opacity="0.3"/>
    <path d="M1039 470l7 7 15-15" stroke="#26C6DA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
