<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.45">
      <stop offset="0%" stop-color="#00BCD4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="0.7" fill="#ffffff" opacity="0.035"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Central glow -->
  <ellipse cx="600" cy="300" rx="500" ry="280" fill="url(#glow)"/>

  <!-- Center node: YOUR STORE -->
  <circle cx="600" cy="290" r="56" fill="#1E3050" stroke="#00BCD4" stroke-opacity="0.4" stroke-width="2"/>
  <!-- Shield icon -->
  <path d="M588 278l12-8 12 8v14c0 6-12 12-12 12s-12-6-12-12z" fill="none" stroke="#00BCD4" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="600" y="316" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#26C6DA">YOUR STORE</text>

  <!-- Surrounding payment nodes — evenly spaced ring -->
  <!-- BTC — top -->
  <line x1="600" y1="234" x2="600" y2="135" stroke="#00BCD4" stroke-opacity="0.12" stroke-width="1.5"/>
  <circle cx="600" cy="110" r="32" fill="#1E3050" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
  <text x="600" y="115" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" opacity="0.55">BTC</text>

  <!-- ETH — top right -->
  <line x1="648" y1="260" x2="770" y2="170" stroke="#00BCD4" stroke-opacity="0.12" stroke-width="1.5"/>
  <circle cx="795" cy="150" r="32" fill="#1E3050" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
  <text x="795" y="155" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" opacity="0.55">ETH</text>

  <!-- SOL — right -->
  <line x1="656" y1="290" x2="810" y2="290" stroke="#00BCD4" stroke-opacity="0.12" stroke-width="1.5"/>
  <circle cx="840" cy="290" r="32" fill="#1E3050" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
  <text x="840" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" opacity="0.55">SOL</text>

  <!-- BNB — bottom right -->
  <line x1="648" y1="320" x2="770" y2="420" stroke="#00BCD4" stroke-opacity="0.12" stroke-width="1.5"/>
  <circle cx="795" cy="440" r="32" fill="#1E3050" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
  <text x="795" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" opacity="0.55">BNB</text>

  <!-- Stripe/PayPal — bottom -->
  <line x1="600" y1="346" x2="600" y2="445" stroke="#00BCD4" stroke-opacity="0.12" stroke-width="1.5"/>
  <circle cx="600" cy="475" r="32" fill="#1E3050" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
  <text x="600" y="470" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.55">Stripe</text>
  <text x="600" y="486" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ffffff" opacity="0.55">PayPal</text>

  <!-- LTC — bottom left -->
  <line x1="552" y1="320" x2="430" y2="420" stroke="#00BCD4" stroke-opacity="0.12" stroke-width="1.5"/>
  <circle cx="405" cy="440" r="32" fill="#1E3050" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
  <text x="405" y="445" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" opacity="0.55">LTC</text>

  <!-- ZEC — left -->
  <line x1="544" y1="290" x2="390" y2="290" stroke="#00BCD4" stroke-opacity="0.12" stroke-width="1.5"/>
  <circle cx="360" cy="290" r="32" fill="#1E3050" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
  <text x="360" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" opacity="0.55">ZEC</text>

  <!-- Telegram — top left -->
  <line x1="552" y1="260" x2="430" y2="170" stroke="#00BCD4" stroke-opacity="0.12" stroke-width="1.5"/>
  <circle cx="405" cy="150" r="32" fill="#1E3050" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
  <text x="405" y="148" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff" opacity="0.55">Telegram</text>
  <text x="405" y="163" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ffffff" opacity="0.55">Mini App</text>

  <!-- Outer decorative ring arcs -->
  <circle cx="600" cy="290" r="230" fill="none" stroke="#00BCD4" stroke-opacity="0.04" stroke-width="1" stroke-dasharray="8 12"/>

  <!-- Bottom tagline -->
  <text x="600" y="575" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="500" fill="#ffffff" opacity="0.4">Zero commissions. Built-in buyer protection. Your data.</text>
</svg>
