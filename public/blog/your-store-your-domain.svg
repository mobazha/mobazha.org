<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B1120"/>
      <stop offset="100%" stop-color="#152238"/>
    </linearGradient>
    <linearGradient id="glow" x1="600" y1="100" x2="600" y2="530" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00BCD4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="0.7" fill="#ffffff" opacity="0.035"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Glow -->
  <ellipse cx="600" cy="300" rx="440" ry="260" fill="url(#glow)"/>

  <!-- Browser window -->
  <rect x="120" y="60" width="960" height="510" rx="16" fill="#1E3050" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="120" y="60" width="960" height="52" rx="16" fill="#152238"/>
  <rect x="120" y="96" width="960" height="16" fill="#152238"/>
  <circle cx="156" cy="86" r="7" fill="#ff5f57" opacity="0.8"/>
  <circle cx="180" cy="86" r="7" fill="#febc2e" opacity="0.8"/>
  <circle cx="204" cy="86" r="7" fill="#28c840" opacity="0.8"/>

  <!-- URL bar -->
  <rect x="300" y="72" width="500" height="28" rx="8" fill="#0B1120" stroke="#ffffff" stroke-opacity="0.05"/>
  <rect x="318" y="80" width="10" height="10" rx="2" fill="none" stroke="#28c840" stroke-width="1.3"/>
  <path d="M321 80v-3a3 3 0 0 1 6 0v3" fill="none" stroke="#28c840" stroke-width="1.3"/>
  <text x="336" y="91" font-family="ui-monospace, 'SF Mono', monospace" font-size="13" fill="#26C6DA" font-weight="500">alice-shop.mymbz.org</text>

  <!-- Store content -->
  <rect x="140" y="128" width="920" height="426" fill="#0B1120" opacity="0.4"/>

  <!-- Store header bar -->
  <rect x="160" y="148" width="880" height="60" rx="8" fill="#152238" stroke="#ffffff" stroke-opacity="0.03"/>
  <circle cx="200" cy="178" r="18" fill="#00BCD4" opacity="0.25"/>
  <text x="200" y="183" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#26C6DA">A</text>
  <text x="230" y="183" font-family="system-ui, sans-serif" font-size="17" font-weight="600" fill="#ffffff" opacity="0.9">Alice's Digital Shop</text>
  <!-- Nav items -->
  <rect x="780" y="170" width="50" height="8" rx="4" fill="#ffffff" opacity="0.1"/>
  <rect x="844" y="170" width="40" height="8" rx="4" fill="#ffffff" opacity="0.1"/>
  <rect x="898" y="170" width="60" height="8" rx="4" fill="#ffffff" opacity="0.1"/>
  <rect x="972" y="170" width="48" height="8" rx="4" fill="#ffffff" opacity="0.1"/>

  <!-- Hero section -->
  <rect x="160" y="224" width="880" height="100" rx="8" fill="#152238" opacity="0.6"/>
  <rect x="220" y="248" width="260" height="14" rx="5" fill="#ffffff" opacity="0.12"/>
  <rect x="220" y="274" width="400" height="10" rx="4" fill="#ffffff" opacity="0.06"/>
  <rect x="220" y="294" width="100" height="28" rx="6" fill="#00BCD4" opacity="0.2" stroke="#00BCD4" stroke-opacity="0.3"/>
  <text x="270" y="313" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#26C6DA">Shop Now</text>

  <!-- Product grid -->
  <rect x="160" y="344" width="276" height="200" rx="10" fill="#152238" stroke="#ffffff" stroke-opacity="0.03"/>
  <rect x="176" y="360" width="244" height="110" rx="6" fill="#1E3050"/>
  <rect x="176" y="484" width="140" height="10" rx="4" fill="#ffffff" opacity="0.12"/>
  <rect x="176" y="504" width="80" height="12" rx="4" fill="#00BCD4" opacity="0.3"/>

  <rect x="462" y="344" width="276" height="200" rx="10" fill="#152238" stroke="#ffffff" stroke-opacity="0.03"/>
  <rect x="478" y="360" width="244" height="110" rx="6" fill="#1E3050"/>
  <rect x="478" y="484" width="160" height="10" rx="4" fill="#ffffff" opacity="0.12"/>
  <rect x="478" y="504" width="70" height="12" rx="4" fill="#00BCD4" opacity="0.3"/>

  <rect x="764" y="344" width="276" height="200" rx="10" fill="#152238" stroke="#ffffff" stroke-opacity="0.03"/>
  <rect x="780" y="360" width="244" height="110" rx="6" fill="#1E3050"/>
  <rect x="780" y="484" width="120" height="10" rx="4" fill="#ffffff" opacity="0.12"/>
  <rect x="780" y="504" width="90" height="12" rx="4" fill="#00BCD4" opacity="0.3"/>

  <!-- Annotation -->
  <text x="600" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="500" fill="#26C6DA" opacity="0.7">Your domain. Your brand. Your store.</text>
</svg>
